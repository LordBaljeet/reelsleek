<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReelSleek – Permission needed</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <img src="../icons/logo-no-bg-325.png" width="56" height="56" alt="ReelSleek logo" class="logo" />
      <h1>One quick step</h1>
      <p>
        ReelSleek needs access to <strong>instagram.com</strong> to inject the
        volume slider and seekbar into videos.
      </p>
      <ul>
        <li>🔇 Control video volume without touching Instagram's UI</li>
        <li>⏩ Seek through Reels with the seekbar</li>
        <li>🔒 No data is collected or sent anywhere</li>
      </ul>

      <button id="grantBtn">Allow access to Instagram</button>

      <p class="hint" id="hint"></p>
    </div>
    <script src="script.js"></script>
  </body>
</html>
